name: CI checks

# Постоянные проверки перед мержем: тесты бэкенда, типы фронта и аудит
# зависимостей на известные уязвимости. Не блокирует деплой напрямую —
# запускается на PR и push в main; можно сделать required-проверкой в настройках.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  camera-pc-static:
    name: Windows camera-PC package
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Parse and test PowerShell camera package
        shell: powershell
        run: .\deploy\camera-pc\tests\Invoke-StaticTests.ps1

  cv-service:
    name: Camera AI service contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
          cache: pip
          cache-dependency-path: cv_service/requirements-test.txt
      - name: Install lightweight API test dependencies
        run: pip install -r cv_service/requirements-test.txt
      - name: Test API, security and processor lifecycle
        run: pytest -q cv_service/tests

  backend:
    name: Backend tests + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asyl
          POSTGRES_USER: asyl
          POSTGRES_PASSWORD: asyl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U asyl" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      SECRET_KEY: ci-test-secret
      DB_NAME: asyl
      DB_USER: asyl
      DB_PASSWORD: asyl
      DB_HOST: localhost
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Run tests
        working-directory: backend
        run: pytest -q
      - name: Audit Python dependencies
        working-directory: backend
        # Аудит информативен: новая CVE в зависимости не должна внезапно
        # блокировать деплой критичного фикса. Смотрим в логах прогона.
        continue-on-error: true
        run: pip-audit -r requirements.txt --strict || true

  frontend:
    name: Frontend checks + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npx --yes npm@10.9.8 ci
      - name: Lint, typecheck and test
        working-directory: frontend
        run: npm run check
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api
      - name: Audit npm dependencies (high+)
        working-directory: frontend
        run: npm audit --audit-level=high
