name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      backend_digest: ${{ steps.backend_image.outputs.digest }}
      frontend_digest: ${{ steps.frontend_image.outputs.digest }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        id: backend_image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        id: frontend_image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    # Бюджет worst-case: ожидание SSH (до 10 мин суммарно на обе попытки) +
    # два полных прогона remote-deploy.sh + health check.
    timeout-minutes: 30
    env:
      PROD_HOST: ${{ secrets.PROD_HOST || '78.40.109.240' }}
      PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
      PROD_USER: ${{ secrets.PROD_USER || 'ubuntu' }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BACKEND_IMAGE_REF: ghcr.io/${{ github.repository }}-backend@${{ needs.build.outputs.backend_digest }}
      FRONTEND_IMAGE_REF: ghcr.io/${{ github.repository }}-frontend@${{ needs.build.outputs.frontend_digest }}

    steps:
      - name: Skip until deploy key is configured
        if: ${{ env.PROD_SSH_KEY == '' }}
        run: echo "PROD_SSH_KEY is not configured; skipping production deploy."

      - name: Deploy over SSH
        if: ${{ env.PROD_SSH_KEY != '' }}
        run: |
          set -euo pipefail

          test -n "$PROD_HOST"
          test -n "$PROD_PORT"
          test -n "$PROD_USER"
          test -n "$PROD_SSH_KEY"
          test -n "$BACKEND_IMAGE_REF"
          test -n "$FRONTEND_IMAGE_REF"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/asyl_ltd_deploy_key
          chmod 600 ~/.ssh/asyl_ltd_deploy_key

          run_ssh() {
            # ServerAlive 15с × 6 — мёртвое соединение обнаруживается за ~1.5
            # минуты, а не висит десятки минут до job-таймаута.
            ssh \
              -i ~/.ssh/asyl_ltd_deploy_key \
              -p "$PROD_PORT" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=6 \
              "$PROD_USER@$PROD_HOST" "$@"
          }

          # Хостинг может перезагрузить сервер в любой момент — ждём SSH
          # до ~5 минут вместо мгновенного падения. Ошибку ssh не глотаем:
          # при неудаче показываем её (ключ/доступ vs недоступный хост).
          wait_for_ssh() {
            for i in $(seq 1 30); do
              if run_ssh true 2>/tmp/ssh-probe-err.log; then
                echo "SSH доступен (попытка $i)."
                return 0
              fi
              echo "SSH недоступен, ждём 10с (попытка $i/30)…"
              sleep 10
            done
            echo "::error::Сервер недоступен по SSH. Последняя ошибка ssh:"
            cat /tmp/ssh-probe-err.log || true
            return 1
          }

          # Репозиторий (и сам деплой-скрипт) обновляется ДО запуска скрипта,
          # чтобы изменения деплоя вступали в силу в этом же прогоне.
          # На сервере remote-deploy.sh держит flock — ретрай не гоняется
          # с ещё живой первой попыткой.
          deploy() {
            run_ssh \
              "cd /home/ubuntu/asyl-ltd \
               && git fetch origin main && git checkout main && git pull --ff-only origin main \
               && BRANCH=main \
                  GHCR_USER='$GHCR_USER' \
                  GHCR_TOKEN='$GHCR_TOKEN' \
                  BACKEND_IMAGE_REF='$BACKEND_IMAGE_REF' \
                  FRONTEND_IMAGE_REF='$FRONTEND_IMAGE_REF' \
                  ./deploy/remote-deploy.sh"
          }

          wait_for_ssh

          # Одна повторная попытка: покрывает обрыв связи или перезагрузку
          # посреди деплоя. Перед ретраем снова ждём SSH — сервер мог уйти
          # в ребут на несколько минут.
          if ! deploy; then
            echo "Деплой не удался — ждём сервер и пробуем ещё раз…"
            sleep 30
            wait_for_ssh
            deploy
          fi

      - name: Health check
        if: ${{ env.PROD_SSH_KEY != '' }}
        run: |
          set -euo pipefail
          url="${SITE_URL:-https://asyl-ltd.kz}/api/auth/me/"
          # Бэкенд стартует не мгновенно (миграции, gunicorn) — ждём до 3 минут.
          for i in $(seq 1 36); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || true)
            if [ "$code" = "401" ] || [ "$code" = "200" ]; then
              echo "API отвечает (HTTP $code) — деплой здоров."
              exit 0
            fi
            echo "API ещё не готов (HTTP $code), попытка $i/36…"
            sleep 5
          done
          echo "::error::API не поднялся после деплоя (последний код: $code)."
          exit 1

      - name: Frontend redirect safety gate
        if: ${{ env.PROD_SSH_KEY != '' }}
        env:
          SITE_URL: https://asyl-ltd.kz
        run: |
          set -euo pipefail

          inspect_response() {
            path="$1"
            expected_code="$2"
            headers=$(mktemp)
            trap 'rm -f "$headers"' RETURN

            code=$(curl -sS --max-time 15 --max-redirs 0 \
              -D "$headers" -o /dev/null -w '%{http_code}' \
              "${SITE_URL}${path}")
            location=$(awk 'tolower($1)=="location:" {sub(/^[^:]*:[[:space:]]*/, ""); sub(/\r$/, ""); print; exit}' "$headers")
            refresh=$(awk 'tolower($1)=="refresh:" {sub(/^[^:]*:[[:space:]]*/, ""); sub(/\r$/, ""); print; exit}' "$headers")

            if [ "$code" != "$expected_code" ]; then
              echo "::error::${path} returned HTTP ${code}; expected ${expected_code}."
              return 1
            fi
            if [ -n "$refresh" ]; then
              echo "::error::${path} returned a forbidden Refresh header."
              return 1
            fi
            case "$location" in
              ""|/*)
                case "$location" in
                  //*) echo "::error::Protocol-relative redirect is forbidden: ${location}"; return 1 ;;
                esac
                ;;
              "${SITE_URL}"|"${SITE_URL}"/*|https://www.asyl-ltd.kz|https://www.asyl-ltd.kz/*) ;;
              *)
                echo "::error::Foreign redirect is forbidden: ${location}"
                return 1
                ;;
            esac

            if [ "$path" = "/" ]; then
              case "$location" in
                /login|/login\?*|"${SITE_URL}/login"|"${SITE_URL}/login?"*|https://www.asyl-ltd.kz/login|https://www.asyl-ltd.kz/login\?*) ;;
                *)
                  echo "::error::Root did not redirect to the expected login page: ${location:-<missing>}"
                  return 1
                  ;;
              esac
            fi
          }

          inspect_response / 307
          inspect_response /login 200
          echo "Frontend serves the expected login flow without foreign redirects."

      - name: Camera path health gate
        if: ${{ env.PROD_SSH_KEY != '' }}
        run: |
          set -euo pipefail

          # Require a probe after this CI step too. The +1 closes the
          # same-second race with Django's microsecond timestamp.
          gate_epoch=$(($(date +%s) + 1))
          set +e
          output=$(ssh \
            -i ~/.ssh/asyl_ltd_deploy_key \
            -p "$PROD_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$PROD_USER@$PROD_HOST" \
            "cd /home/ubuntu/asyl-ltd \
             && CAMERA_HEALTH_REQUIRE_SINCE_EPOCH=$gate_epoch \
                CAMERA_HEALTH_WAIT_SECONDS=120 \
                ./deploy/health/wait-for-camera-health.sh" 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$output"

          case "$rc" in
            0)
              echo "Camera path is healthy or acceptably degraded."
              ;;
            2)
              echo "::error::Camera monitor is unavailable or its heartbeat is stale."
              exit 2
              ;;
            3)
              echo "::error::Camera health reports an outage or critical capacity loss."
              exit 3
              ;;
            255)
              echo "::error::SSH failed while checking the camera path."
              exit 255
              ;;
            *)
              echo "::error::Camera path health gate failed (exit $rc)."
              exit "$rc"
              ;;
          esac
