name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:latest
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    env:
      PROD_HOST: ${{ secrets.PROD_HOST || '78.40.109.240' }}
      PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
      PROD_USER: ${{ secrets.PROD_USER || 'ubuntu' }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Skip until deploy key is configured
        if: ${{ env.PROD_SSH_KEY == '' }}
        run: echo "PROD_SSH_KEY is not configured; skipping production deploy."

      - name: Deploy over SSH
        if: ${{ env.PROD_SSH_KEY != '' }}
        run: |
          set -euo pipefail

          test -n "$PROD_HOST"
          test -n "$PROD_PORT"
          test -n "$PROD_USER"
          test -n "$PROD_SSH_KEY"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/asyl_ltd_deploy_key
          chmod 600 ~/.ssh/asyl_ltd_deploy_key
          ssh-keyscan -T 15 -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

          # Репозиторий (и сам деплой-скрипт) обновляется ДО запуска скрипта,
          # чтобы изменения деплоя вступали в силу в этом же прогоне.
          ssh \
            -i ~/.ssh/asyl_ltd_deploy_key \
            -p "$PROD_PORT" \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            "$PROD_USER@$PROD_HOST" \
            "cd /home/ubuntu/asyl-ltd \
             && git fetch origin main && git checkout main && git pull --ff-only origin main \
             && BRANCH=main GHCR_USER=$GHCR_USER GHCR_TOKEN=$GHCR_TOKEN ./deploy/remote-deploy.sh"
