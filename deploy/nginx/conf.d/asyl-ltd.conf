upstream asyl_backend {
    server backend:8000;
}

upstream asyl_frontend {
    server frontend:3000;
}

upstream asyl_go2rtc {
    server go2rtc:1984;
}

# Rate limits intentionally apply only to HTTP API traffic. Camera streaming
# and WebSocket connections are excluded, so long-lived video sessions are not
# throttled or disconnected.
limit_req_zone $binary_remote_addr zone=asyl_api_per_ip:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=asyl_auth_per_ip:10m rate=10r/m;
limit_req_status 429;

map $http_upgrade $asyl_connection_upgrade {
    default upgrade;
    ''      close;
}

# Never forward a cross-origin redirect supplied by the frontend process. A
# compromised runtime may still return a 3xx status, but browsers receive no
# usable Location header unless it is relative or points back to this site.
map $upstream_http_location $asyl_safe_frontend_location {
    default "";
    ""      "";
    "/"     "/";
    ~^//    "";
    ~^/[^/\\\r\n][^\\\r\n]*$ $upstream_http_location;
    ~*^https://(?:www\.)?asyl-ltd\.kz(?::443)?(?:/[^\\\r\n]*)?$ $upstream_http_location;
}

server_tokens off;

server {
    listen 80;
    listen [::]:80;
    server_name asyl-ltd.kz www.asyl-ltd.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name asyl-ltd.kz www.asyl-ltd.kz;

    ssl_certificate /etc/letsencrypt/live/asyl-ltd.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asyl-ltd.kz/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ASYLSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/conf.d/snippets/security-headers.conf;

    client_max_body_size 100m;

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/snippets/security-headers.conf;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
        include /etc/nginx/conf.d/snippets/security-headers.conf;
    }

    # Authentication endpoints get a much tighter limit than ordinary API
    # traffic to slow password guessing without affecting camera playback.
    location = /api/auth/login/ {
        limit_req zone=asyl_auth_per_ip burst=10 nodelay;
        proxy_pass http://asyl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=asyl_api_per_ip burst=90 nodelay;
        proxy_pass http://asyl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Видеопотоки камер (go2rtc). Доступ только с cam_token-cookie,
    # которую выдаёт бэкенд авторизованным сотрудникам.
    location = /go2rtc/auth {
        internal;
        proxy_pass http://asyl_backend/api/cameras/auth/;
        proxy_set_header Host $host;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    location /go2rtc/ {
        auth_request /go2rtc/auth;
        proxy_pass http://asyl_go2rtc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $asyl_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /admin/ {
        proxy_pass http://asyl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://asyl_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $asyl_connection_upgrade;
        proxy_hide_header Location;
        proxy_hide_header Refresh;
        add_header Location $asyl_safe_frontend_location always;
        include /etc/nginx/conf.d/snippets/security-headers.conf;
    }
}
