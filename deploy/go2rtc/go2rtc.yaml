# go2rtc: рестрим сабпотоков камер цеха (MediaMTX на ПК с камерами) в
# WebRTC/SRTP UDP для браузера. Реквизиты берутся из окружения контейнера:
#   CAMERA_HOST, CAMERA_USER, CAMERA_PASS
#
# Пути cam1..camN на MediaMTX динамические (по числу каналов NVR), поэтому
# здесь пре-провижен запас cam1..cam32: потоки поднимаются только по
# требованию, несуществующие/неиспользуемые ничего не стоят. Какие камеры
# реально есть — определяет бэкенд (apps/cameras/services.py).
#
# Кодеки: сабпотоки NVR — уже H.264 (HIK отдаёт H264/Main), браузер играет
# их без перекодирования — go2rtc лишь ремуксит RTSP→fMP4 (~0% CPU).
# Забирать поток обязан нативный RTSP-клиент go2rtc: ffmpeg напрямую до
# MediaMTX не достукивается (400 на авторизованный DESCRIBE).
#
# Второй источник (ffmpeg:camN#video=h264) — транскод «по требованию»:
# go2rtc поднимет его ТОЛЬКО если консюмеру нужен H.264, а камера отдала
# другой кодек (например, будущая камера с HEVC-сабпотоком). Раньше здесь
# был безусловный ffmpeg-транскод на каждую камеру — 10 постоянных
# процессов H.264→H.264 съедали 150% CPU двухъядерного сервера и давали
# лаги на всех потоках сразу.

api:
  listen: ":1984"

# rtsp-модуль нужен самому go2rtc: через него ffmpeg-запаска читает поток
# и возвращает перекодированный. Порт наружу не публикуется.
rtsp:
  listen: ":8554"

# Сигналинг остаётся за авторизованным HTTPS/WebSocket nginx-маршрутом, а
# зашифрованное видео идёт напрямую в браузер по UDP/8555. TCP-кандидаты
# отключены намеренно: head-of-line blocking не должен замораживать весь кадр.
webrtc:
  listen: ":8555"
  candidates:
    - ${GO2RTC_WEBRTC_CANDIDATE}
  filters:
    networks: [udp4]

streams:
  cam1:
    - rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam1sub
    - ffmpeg:cam1#video=h264
