    - ffmpeg:cam32#video=h264

  # AI-потоки: ai_service на ПК с камерами публикует в MediaMTX camNai —
  # аннотированное видео подсчёта мешков (боксы, линия, счётчик в кадре).
  # Уже H.264, транскод не нужен — нативный RTSP-рестрим без ffmpeg.
  # Пока модель на камере не запущена, MediaMTX отдаёт 404 — go2rtc
  # поднимает поток по требованию, плеер на фронте ретраит сам.
