# go2rtc: перекодирование RTSP (HEVC) с камер цеха в H.264 для браузера.
# Реквизиты берутся из окружения контейнера (.env сервера):
#   CAMERA_HOST, CAMERA_USER, CAMERA_PASS
# Потоки поднимаются по требованию — без зрителей ffmpeg не работает.
#
# Двухступенчатая схема: camNsrc забирает поток у MediaMTX нативным
# RTSP-клиентом go2rtc (ffmpeg напрямую не может — MediaMTX отвечает 400
# на его digest-авторизацию), а camN — это ffmpeg-транскод HEVC→H.264
# с внутреннего rtsp://127.0.0.1:8554/camNsrc уже без авторизации.

api:
  listen: ":1984"

# rtsp-модуль нужен самому go2rtc: через него ffmpeg возвращает
# перекодированный поток и читает camNsrc. Порт наружу не публикуется.
rtsp:
  listen: ":8554"

webrtc:
  listen: ""

streams:
  # cam1src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam1src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam1sub
  cam1: ffmpeg:cam1src#video=h264
  # cam2src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam2src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam2sub
  cam2: ffmpeg:cam2src#video=h264
  # cam3src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam3src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam3sub
  cam3: ffmpeg:cam3src#video=h264
  # cam4src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam4src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam4sub
  cam4: ffmpeg:cam4src#video=h264
  # cam5src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam5src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam5sub
  cam5: ffmpeg:cam5src#video=h264
  # cam6src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam6src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam6sub
  cam6: ffmpeg:cam6src#video=h264
  # cam7src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam7src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam7sub
  cam7: ffmpeg:cam7src#video=h264
  # cam8src: сырой HEVC с MediaMTX (нативный клиент go2rtc, digest-auth ок)
  cam8src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam8sub
  cam8: ffmpeg:cam8src#video=h264
