# go2rtc: перекодирование RTSP (HEVC) с камер цеха в H.264 для браузера.
# Реквизиты берутся из окружения контейнера (.env сервера):
#   CAMERA_HOST, CAMERA_USER, CAMERA_PASS
#
# Пути cam1..camN на MediaMTX динамические (по числу каналов NVR), поэтому
# здесь пре-провижен запас cam1..cam32: потоки поднимаются только по
# требованию, несуществующие/неиспользуемые ничего не стоят. Какие камеры
# реально есть — определяет бэкенд (apps/cameras/services.py).
#
# Двухступенчатая схема: camNsrc забирает поток у MediaMTX нативным
# RTSP-клиентом go2rtc (ffmpeg напрямую не может — MediaMTX отвечает 400
# на его авторизованный DESCRIBE), а camN — это ffmpeg-транскод HEVC→H.264
# с внутреннего rtsp://127.0.0.1:8554/camNsrc уже без авторизации.

api:
  listen: ":1984"

# rtsp-модуль нужен самому go2rtc: через него ffmpeg возвращает
# перекодированный поток и читает camNsrc. Порт наружу не публикуется.
rtsp:
  listen: ":8554"

webrtc:
  listen: ""

streams:
  cam1src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam1sub
  cam1: ffmpeg:cam1src#video=h264
  cam2src: rtsp://${CAMERA_USER}:${CAMERA_PASS}@${CAMERA_HOST}:8554/cam2sub
  cam2: ffmpeg:cam2src#video=h264
