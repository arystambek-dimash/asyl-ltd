services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: asyl
      POSTGRES_USER: asyl
      POSTGRES_PASSWORD: asyl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asyl"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_NAME: asyl
      DB_USER: asyl
      DB_PASSWORD: asyl
      DB_HOST: db
      DB_PORT: "5432"
      DEBUG: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      SUPER_ADMIN_EMAIL: "${SUPER_ADMIN_EMAIL:-admin@asyl.local}"
      SUPER_ADMIN_PASS: "${SUPER_ADMIN_PASS:-admin12345}"
      SUPER_ADMIN_RESET_PASSWORD: "${SUPER_ADMIN_RESET_PASSWORD:-0}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
