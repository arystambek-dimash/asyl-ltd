services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: asyl
      POSTGRES_USER: asyl
      POSTGRES_PASSWORD: asyl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asyl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    environment:
      DB_NAME: asyl
      DB_USER: asyl
      DB_PASSWORD: asyl
      DB_HOST: db
      DB_PORT: "5432"
      DEBUG: "1"
      ALLOWED_HOSTS: "*"  # сервер в локальной сети цеха — доступен по своему IP
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      REDIS_URL: "redis://redis:6379/0"
      SUPER_ADMIN_EMAIL: "${SUPER_ADMIN_EMAIL:-admin@asyl.local}"
      SUPER_ADMIN_PASS: "${SUPER_ADMIN_PASS:-admin12345}"
      SUPER_ADMIN_RESET_PASSWORD: "${SUPER_ADMIN_RESET_PASSWORD:-0}"
      # Камеры и AI-подсчёт: для локальной отладки укажите хосты в .env
      # (host.docker.internal — мок на маке); пусто = функции выключены.
      CAMERA_HOST: "${CAMERA_HOST:-}"
      CAMERA_PORT: "${CAMERA_PORT:-8554}"
      CAMERA_PASS: "${CAMERA_PASS:-}"
      CAMERA_AI_URL: "${CAMERA_AI_URL:-}"
      CAMERA_AI_KEY: "${CAMERA_AI_KEY:-}"
      AI_SERVICE_URL: "${AI_SERVICE_URL:-${CAMERA_AI_URL:-}}"
      AI_SERVICE_API_KEY: "${AI_SERVICE_API_KEY:-${CAMERA_AI_KEY:-}}"
      AI_SERVICE_TIMEOUT: "${AI_SERVICE_TIMEOUT:-10}"
      CAMERA_PLAYBACK_URL: "${CAMERA_PLAYBACK_URL:-}"
      GO2RTC_API_URL: "${GO2RTC_API_URL:-}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - mediadata:/app/media
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"


  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Almaty
      - SERVERURL=${WG_SERVERURL:-78.40.109.240}
      - SERVERPORT=${WG_SERVERPORT:-51820}
      - PEERS=${WG_PEERS:-operator-laptop}
      - PEERDNS=${WG_PEERDNS:-1.1.1.1}
      - INTERNAL_SUBNET=${WG_INTERNAL_SUBNET:-10.13.13.0}
      # Split tunnel: VPN subnet + camera LAN only. Replace camera LAN in .env.
      - ALLOWEDIPS=${WG_ALLOWEDIPS:-10.13.13.0/24,192.168.1.0/24}
      - PERSISTENTKEEPALIVE_PEERS=${WG_PERSISTENTKEEPALIVE_PEERS:-all}
      - LOG_CONFS=true
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  mediadata:
